# 生产容器:托管 Next.js 静态导出产物,/api 反代 workflow 服务
# (与开发期 next dev 的 rewrites 行为一致)。
server {
    listen 8084;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://workflow:8081;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # 员工级 REST 面(新 phoenix-doc-assistant 专家,OAuth Bearer;与 /api 共用 workflow)。
    # Authorization 头由 nginx 默认透传;workflow 校验 Keycloak token。
    location /pub/v1/ {
        proxy_pass http://workflow:8081;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # 静态导出的页面形如 /review.html,兜底回 index.html
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
