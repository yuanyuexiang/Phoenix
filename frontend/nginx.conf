# 生产容器:托管前端静态资源,/api 反代 workflow 服务(与开发期 vite 代理一致)。
server {
    listen 8084;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://workflow:8081;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;
    }
}
