# 增值税发票 —— 按公开票面字段定义,演示"真实单据类型"的配置方式。
# 客户正式启用前,请按实际票种(专票/普票/电子票)与业务口径核对字段清单。
name: invoice
title: 增值税发票
description: 增值税发票(专用/普通),提取票面关键要素用于入账与查验。
fields:
  - name: invoice_code
    label: 发票代码
    rule:
      pattern: '\d{10,12}'
  - name: invoice_no
    label: 发票号码
    aliases: [号码]
    rule:
      required: true
      pattern: '\d{8,20}'
  - name: issue_date
    label: 开票日期
    aliases: [开具日期]
    rule:
      required: true
      pattern: '\d{4}[-/年]\d{1,2}[-/月]\d{1,2}日?'
  - name: buyer
    label: 购买方名称
    aliases: [购买方, 购方名称]
    rule:
      required: true
  - name: seller
    label: 销售方名称
    aliases: [销售方, 销方名称]
    rule:
      required: true
  - name: total_amount
    label: 价税合计
    aliases: [价税合计(大写小写), 合计金额]
    rule:
      required: true
      pattern: '[¥￥]?[0-9,]+(\.[0-9]{1,2})?'
  - name: tax_amount
    label: 税额
    aliases: [合计税额]
    rule:
      pattern: '[¥￥]?[0-9,]+(\.[0-9]{1,2})?'
