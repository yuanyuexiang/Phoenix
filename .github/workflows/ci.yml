# CI:每次 push / PR 验证后端与前端可构建、测试通过。
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Go 构建与测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: gofmt 检查
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "以下文件未经 gofmt 格式化:"; echo "$UNFORMATTED"; exit 1
          fi

  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Build(静态导出)
        run: npm run build
        env:
          BUILD_STATIC: "1"
