# 自动化部署:构建推送 6 个服务镜像 → SSH 到服务器 compose 拉起。
#
# 触发:打 v* 标签,或手动 workflow_dispatch。
#
# 需要在仓库 Settings → Secrets and variables → Actions 配置:
#   REGISTRY_USERNAME / REGISTRY_PASSWORD   镜像仓库凭据(阿里云 ACR)
#   DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY   部署服务器 SSH(key 为私钥全文)
# 可选 Variables(不设则用默认值):
#   REGISTRY(默认 registry.cn-hangzhou.aliyuncs.com)
#   REGISTRY_NAMESPACE(默认 yuanyuexiang)
#   DEPLOY_DIR(默认 /opt/phoenix-dip)
#
# 服务器前置(一次性):
#   1. mkdir -p /opt/phoenix-dip && 按 deploy/.env.prod.example 写好 .env
#   2. Traefik 已运行且回源网络 matrix-network 已存在
name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY || 'registry.cn-hangzhou.aliyuncs.com' }}
  NAMESPACE: ${{ vars.REGISTRY_NAMESPACE || 'yuanyuexiang' }}

jobs:
  build-push:
    name: 构建推送 ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Go 四服务共用 backend/Dockerfile,SERVICE 参数区分
          - { name: workflow, context: backend, build_args: "SERVICE=workflow" }
          - { name: parser, context: backend, build_args: "SERVICE=parser" }
          - { name: ai, context: backend, build_args: "SERVICE=ai" }
          - { name: mcp, context: backend, build_args: "SERVICE=mcp" }
          - { name: admin, context: frontend, build_args: "" }
          - { name: ocr, context: ocr, build_args: "" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 计算镜像标签
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/phoenix-dip-${{ matrix.name }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/phoenix-dip-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  deploy:
    name: SSH 部署
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: 计算镜像标签
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: 同步 compose 文件到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: deploy/docker-compose.prod.yml
          target: ${{ vars.DEPLOY_DIR || '/opt/phoenix-dip' }}
          strip_components: 1

      - name: 拉取镜像并滚动更新
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            cd ${{ vars.DEPLOY_DIR || '/opt/phoenix-dip' }}
            test -f .env || { echo "缺少 .env(参考仓库 deploy/.env.prod.example)"; exit 1; }
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            export TAG=${{ steps.meta.outputs.tag }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "部署完成:TAG=$TAG"

      - name: 部署后健康检查
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            sleep 10
            for c in phoenix-dip-workflow phoenix-dip-mcp phoenix-dip-admin; do
              STATE=$(docker inspect -f '{{.State.Status}}' "$c" 2>/dev/null || echo missing)
              echo "$c: $STATE"
              [ "$STATE" = "running" ] || exit 1
            done
