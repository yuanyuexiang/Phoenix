# ===================================
# Phoenix DIP 生产部署 —— 仅使用已构建镜像(不构建),Traefik 反向代理
# ===================================
#
# 拓扑(Traefik 已在服务器上运行,独占 80/443,回源网络 matrix-network):
#   Traefik ──▶ admin(nginx :8084,SPA + /api 反代 workflow)   Host(${DIP_DOMAIN})
#          ├──▶ mcp(:8080,WorkBuddy 连接器)                    Host(${DIP_DOMAIN}) && PathPrefix(/mcp)
#          └──▶ keycloak(:8080,MCP OAuth 授权服务器)           Host(${DIP_DOMAIN}) && PathPrefix(/auth)
#   其余服务(workflow/postgres/minio/redis)仅内部网络互通,不暴露。
#   识别/字段提取已移至 WorkBuddy 客户端,后端不再有 parser/ai 服务。
#
# 注意:
#   - 项目名/容器名统一 phoenix 前缀。若服务器上仍有旧的同名 compose 项目(phoenix-backend 等),
#     两个项目会共用项目名:部署脚本已不用 --remove-orphans,但仍建议先下线旧栈避免混淆。
#   - 镜像由 GitHub Actions 构建推送(.github/workflows/deploy.yml),TAG 由部署时注入。
#   - 服务器上 /opt/phoenix/.env 提供机密配置,参考 .env.prod.example,勿入仓库。
#
# 使用:TAG=sha-xxxxxxx docker compose -f docker-compose.prod.yml --env-file .env up -d
name: phoenix

services:
  postgres:
    image: pgvector/pgvector:pg16 # 含 pgvector 扩展(知识库向量检索);同 pg16,pgdata 卷兼容
    container_name: phoenix-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: ${POSTGRES_USER:-phoenix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?生产必须设置数据库密码}
      POSTGRES_DB: ${POSTGRES_DB:-phoenix}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-phoenix}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  minio:
    image: minio/minio:latest
    container_name: phoenix-minio
    restart: unless-stopped
    command: server /data
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-phoenix}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?生产必须设置 MinIO 密码}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  redis: # 预留:异步任务队列/缓存
    image: redis:7-alpine
    container_name: phoenix-redis
    restart: unless-stopped
    networks: [internal]

  workflow:
    image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${REGISTRY_NAMESPACE:-yuanyuexiang}/phoenix-workflow:${TAG:-latest}
    container_name: phoenix-workflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      PHX_DB_DSN: postgres://${POSTGRES_USER:-phoenix}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-phoenix}?sslmode=disable
      PHX_MINIO_ENDPOINT: minio:9000
      PHX_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-phoenix}
      PHX_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      PHX_ADMIN_PASSWORD: ${PHX_ADMIN_PASSWORD:?生产必须设置管理后台访问密码}
      # RAG 知识库 embedding:留空则知识库关闭(ask_document 报未启用)
      PHX_EMBED_ENDPOINT: ${PHX_EMBED_ENDPOINT:-}
      PHX_EMBED_API_KEY: ${PHX_EMBED_API_KEY:-}
      PHX_EMBED_MODEL: ${PHX_EMBED_MODEL:-text-embedding-v3}
    networks: [internal]

  keycloak: # 授权服务器(MCP OAuth;测试阶段部署,AS 选型拍板后可替换或做企业账号联邦)
    image: quay.io/keycloak/keycloak:26.5
    container_name: phoenix-keycloak
    restart: unless-stopped
    command: start --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?必须设置 Keycloak 管理员密码}
      # 复用平台 Postgres;首次部署前需一次性建库(见 .env.prod.example 注释)。
      # 主机名用容器名 phoenix-postgres 而非服务别名 postgres:keycloak 同时挂在共享的
      # matrix-network 上,别的项目若也有 postgres 别名会被 DNS 解析到错误实例
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://phoenix-postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-phoenix}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # TLS 由 Traefik 终止;/auth 子路径复用主域名,无需新增 DNS
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME: https://phoenix.matrix-net.tech/auth
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/phoenix-realm.json:/opt/keycloak/data/import/phoenix-realm.json:ro
    healthcheck: # 管理口 9000;注意健康路径也吃 KC_HTTP_RELATIVE_PATH(实测 /auth/health/ready)
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [internal, matrix-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phoenix-keycloak.rule=Host(`phoenix.matrix-net.tech`) && PathPrefix(`/auth`)"
      - "traefik.http.routers.phoenix-keycloak.entrypoints=websecure"
      - "traefik.http.routers.phoenix-keycloak.service=phoenix-keycloak"
      - "traefik.http.services.phoenix-keycloak.loadbalancer.server.port=8080"
      - "traefik.http.routers.phoenix-keycloak.tls=true"
      - "traefik.http.routers.phoenix-keycloak.tls.certresolver=${TRAEFIK_CERTRESOLVER:-aliyunresolver}"

  mcp: # WorkBuddy 连接器,经 Traefik 以 /mcp 路径对外
    image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${REGISTRY_NAMESPACE:-yuanyuexiang}/phoenix-mcp:${TAG:-latest}
    container_name: phoenix-mcp
    restart: unless-stopped
    depends_on: [workflow]
    environment:
      TZ: Asia/Shanghai
      PHX_WORKFLOW_URL: http://workflow:8081
      PHX_ADMIN_PASSWORD: ${PHX_ADMIN_PASSWORD} # 内部调用 workflow 的凭证
      # MCP 端点 OAuth 鉴权(docs/MCP-OAuth鉴权方案.md;AS 选型拍板后在 .env 配置,
      # 先 optional 灰度观察再切 required)
      PHX_OAUTH_MODE: ${PHX_OAUTH_MODE:-off}
      PHX_OAUTH_ISSUER: ${PHX_OAUTH_ISSUER:-}
      PHX_OAUTH_DISCOVERY_URL: ${PHX_OAUTH_DISCOVERY_URL:-} # 容器内取 JWKS 的内网地址(公网回环不可靠)
      PHX_OAUTH_AUDIENCE: ${PHX_OAUTH_AUDIENCE:-phoenix-mcp}
      PHX_OAUTH_RESOURCE: ${PHX_OAUTH_RESOURCE:-https://phoenix.matrix-net.tech/mcp}
    networks: [internal, matrix-network]
    labels:
      - "traefik.enable=true"
      # 同域名 /mcp 前缀路由到连接器;规则更长,优先级自然高于 admin 的 Host 规则
      - "traefik.http.routers.phoenix-mcp.rule=Host(`phoenix.matrix-net.tech`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.phoenix-mcp.entrypoints=websecure"
      - "traefik.http.routers.phoenix-mcp.service=phoenix-mcp"
      - "traefik.http.services.phoenix-mcp.loadbalancer.server.port=8080"
      - "traefik.http.routers.phoenix-mcp.tls=true"
      - "traefik.http.routers.phoenix-mcp.tls.certresolver=${TRAEFIK_CERTRESOLVER:-aliyunresolver}"
      # RFC 9728 资源元数据路径不在 /mcp 前缀内,需单独路由到本服务
      # (OAuth 客户端从 401 的 WWW-Authenticate 发现该端点)
      - "traefik.http.routers.phoenix-mcp-oauth-meta.rule=Host(`phoenix.matrix-net.tech`) && PathPrefix(`/.well-known/oauth-protected-resource`)"
      - "traefik.http.routers.phoenix-mcp-oauth-meta.entrypoints=websecure"
      - "traefik.http.routers.phoenix-mcp-oauth-meta.service=phoenix-mcp"
      - "traefik.http.routers.phoenix-mcp-oauth-meta.tls=true"
      - "traefik.http.routers.phoenix-mcp-oauth-meta.tls.certresolver=${TRAEFIK_CERTRESOLVER:-aliyunresolver}"
      # 旧版规范(2025-03-26)的客户端直接在 MCP 域名根部取 AS 元数据,
      # 302 引导到 Keycloak 的 discovery(否则落到 admin SPA 返回 HTML,客户端解析报错)
      - "traefik.http.routers.phoenix-mcp-oauth-as.rule=Host(`phoenix.matrix-net.tech`) && (PathPrefix(`/.well-known/oauth-authorization-server`) || PathPrefix(`/.well-known/openid-configuration`))"
      - "traefik.http.routers.phoenix-mcp-oauth-as.entrypoints=websecure"
      - "traefik.http.routers.phoenix-mcp-oauth-as.service=phoenix-mcp"
      - "traefik.http.routers.phoenix-mcp-oauth-as.tls=true"
      - "traefik.http.routers.phoenix-mcp-oauth-as.tls.certresolver=${TRAEFIK_CERTRESOLVER:-aliyunresolver}"
      - "traefik.http.routers.phoenix-mcp-oauth-as.middlewares=phoenix-as-redirect"
      - "traefik.http.middlewares.phoenix-as-redirect.redirectregex.regex=.*"
      - "traefik.http.middlewares.phoenix-as-redirect.redirectregex.replacement=https://phoenix.matrix-net.tech/auth/realms/phoenix/.well-known/openid-configuration"

  admin: # 前端管理后台(nginx 托管 SPA 并反代 /api 到 workflow),域名主入口
    image: ${REGISTRY:-registry.cn-hangzhou.aliyuncs.com}/${REGISTRY_NAMESPACE:-yuanyuexiang}/phoenix-admin:${TAG:-latest}
    container_name: phoenix-admin
    restart: unless-stopped
    depends_on: [workflow]
    environment:
      TZ: Asia/Shanghai
    networks: [internal, matrix-network]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phoenix-admin.rule=Host(`phoenix.matrix-net.tech`)"
      - "traefik.http.routers.phoenix-admin.entrypoints=websecure"
      - "traefik.http.routers.phoenix-admin.service=phoenix-admin"
      - "traefik.http.services.phoenix-admin.loadbalancer.server.port=8084"
      - "traefik.http.routers.phoenix-admin.tls=true"
      - "traefik.http.routers.phoenix-admin.tls.certresolver=aliyunresolver"

volumes:
  pgdata:
  miniodata:

networks:
  internal: # 本项目内部互通
  matrix-network: # Traefik 回源网络(服务器上已存在)
    external: true
