# Phoenix 全套服务(对应说明书 §7 系统组成):
#   mcp(连接器/主入口) workflow(工作流引擎 + 存储 + 检索)
#   admin(前端管理后台) + postgres/minio/redis
#   识别/字段提取已移至 WorkBuddy 客户端,后端不再有 parser/ai 服务。
#
# 全套启动:  docker compose -f deploy/docker-compose.yml up -d --build
# 仅基础设施(本机调试 Go/前端时):
#   docker compose -f deploy/docker-compose.yml up -d postgres minio redis
services:
  postgres:
    image: pgvector/pgvector:pg16 # 含 pgvector 扩展(知识库向量检索);同 pg16,pgdata 卷兼容
    environment:
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix
      POSTGRES_DB: phoenix
    ports:
      - "5433:5432" # 宿主机端口整体错开,避免与本机其他项目冲突
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: phoenix
      MINIO_ROOT_PASSWORD: phoenix-secret
    ports:
      - "9100:9000"
      - "9101:9001" # Web 控制台
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis: # 预留:后续异步任务队列/缓存(说明书 §7)
    image: redis:7-alpine
    ports:
      - "6380:6379"

  workflow: # 工作流引擎(编排 + 存储 + 检索)
    build:
      context: ../backend
      args: { SERVICE: workflow }
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PHX_DB_DSN: postgres://phoenix:phoenix@postgres:5432/phoenix?sslmode=disable
      PHX_MINIO_ENDPOINT: minio:9000
      PHX_MINIO_ACCESS_KEY: phoenix
      PHX_MINIO_SECRET_KEY: phoenix-secret
      PHX_ADMIN_PASSWORD: phoenix123 # 管理后台访问密码,生产务必修改
      # 配置 embedding 端点后启用 RAG 知识库(ask_document 语义问答);不配则知识库关闭:
      # PHX_EMBED_ENDPOINT: https://dashscope.aliyuncs.com/compatible-mode/v1
      # PHX_EMBED_API_KEY: ${DASHSCOPE_API_KEY}
      # PHX_EMBED_MODEL: text-embedding-v3   # 维度须与迁移里的 vector(1024) 一致
    ports:
      - "8081:8081"

  mcp: # MCP Server(WorkBuddy 连接器,主要使用入口)
    build:
      context: ../backend
      args: { SERVICE: mcp }
    depends_on:
      - workflow
    environment:
      PHX_WORKFLOW_URL: http://workflow:8081
      PHX_ADMIN_PASSWORD: phoenix123 # 与 workflow 一致,内部调用凭证
      # OAuth 联调(先 make oauth-up 起 Keycloak,再解开以下注释重建 mcp):
      # PHX_OAUTH_MODE: optional            # 灰度:有 token 记身份、无 token 放行;强制改 required
      # PHX_OAUTH_ISSUER: http://localhost:8180/realms/phoenix       # token 的 iss,与 KC_HOSTNAME 一致
      # PHX_OAUTH_DISCOVERY_URL: http://keycloak:8080/realms/phoenix # 容器内实际取 discovery/JWKS 的地址
      # PHX_OAUTH_AUDIENCE: phoenix-mcp
      # PHX_OAUTH_RESOURCE: http://localhost:8080/mcp
    ports:
      - "8080:8080"

  keycloak: # 开发用授权服务器(OAuth 联调,make oauth-up 启动;生产 AS 选型未拍板,不进生产 compose)
    image: quay.io/keycloak/keycloak:26.5
    profiles: ["oauth"] # 默认 compose-up 不启动,零影响
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      # 固定 issuer 为宿主机地址:客户端从宿主机取 token,容器内 mcp 经
      # PHX_OAUTH_DISCOVERY_URL 走内网取 JWKS,iss 校验仍按此 URL
      KC_HOSTNAME: http://localhost:8180
    ports:
      - "8180:8080" # 避开项目端口约定(8080-8084/5433/9100/9101/6380)与他项目占用
    volumes:
      - ./keycloak/phoenix-realm.json:/opt/keycloak/data/import/phoenix-realm.json:ro
    healthcheck: # 健康端点在管理口 9000(容器内);镜像无 curl,用 bash /dev/tcp
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '\"status\": \"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20

  admin: # 前端管理后台(React + Ant Design,nginx 托管并反代 /api 到 workflow)
    build: ../frontend
    depends_on:
      - workflow
    ports:
      - "8084:8084"

volumes:
  pgdata:
  miniodata:
